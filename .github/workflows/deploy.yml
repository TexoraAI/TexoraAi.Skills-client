name: Deploy Frontend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy and Build on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd TexoraAi.Skills-client
            git fetch origin
            git reset --hard origin/main
            rm -rf dist
            export NODE_OPTIONS="--max-old-space-size=2048"
            npm install
            npm run build
            sudo find /var/www/html/ -mindepth 1 -not -name '.htaccess' -delete
            sudo cp -r dist/* /var/www/html/

            NEW_HTACCESS=$(printf "Options -MultiViews\nRewriteEngine On\nRewriteBase /\nRewriteCond %%{REQUEST_FILENAME} !-f\nRewriteCond %%{REQUEST_FILENAME} !-d\nRewriteRule ^ index.html [L]\n")
            CURRENT_HTACCESS=""
            if [ -f /var/www/html/.htaccess ]; then
              CURRENT_HTACCESS=$(cat /var/www/html/.htaccess)
            fi

            if [ "$CURRENT_HTACCESS" != "$NEW_HTACCESS" ]; then
              echo ".htaccess is missing or different, updating it"
              echo "$NEW_HTACCESS" | sudo tee /var/www/html/.htaccess > /dev/null
              sudo apachectl configtest
              sudo systemctl reload httpd
            else
              echo ".htaccess already correct, skipping rewrite and reload"
            fi